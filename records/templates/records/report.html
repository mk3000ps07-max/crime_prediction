{% extends 'base.html' %}

{% block extra_css %}
<style>
    /* Styling Django forms to look like premium Bootstrap inputs */
    input[type="text"], input[type="date"], input[type="time"], select, textarea {
        width: 100%;
        padding: 0.75rem 1rem;
        font-size: 0.95rem;
        color: #212529;
        background-color: #f8f9fa;
        border: 1px solid #e0e4e8;
        border-radius: 8px;
        margin-bottom: 1.5rem;
        transition: all 0.2s ease;
    }
    input:focus, select:focus, textarea:focus {
        border-color: #0d6efd;
        background-color: #ffffff;
        outline: none;
        box-shadow: 0 0 0 4px rgba(13, 110, 253, 0.1);
    }
    textarea { height: 120px; resize: none; }
    label { font-weight: 600; margin-bottom: 0.5rem; color: #495057; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.5px;}
</style>
{% endblock %}

{% block content %}
<div class="d-flex align-items-center mb-4">
    <div class="bg-primary bg-opacity-10 p-3 rounded-3 me-3">
        <i class="bi bi-pencil-square text-primary fs-3"></i>
    </div>
    <div>
        <h2 class="fw-bold mb-0 text-dark">Log New Incident</h2>
        <p class="text-secondary mb-0">Enter new verified crime records directly into the secure database.</p>
    </div>
</div>

<div class="row">
    <div class="col-lg-6 col-md-8">
        <div class="card bg-white shadow-sm border-0 rounded-4">
            <div class="card-body p-4 p-md-5">
                
                <form method="POST">
                    
                    {% csrf_token %} 
                    
                    {{ form.as_p }}
                    
                    <hr class="text-muted mt-4 mb-4 opacity-25">
                    
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary fw-semibold px-4 py-2 rounded-3">
                            <i class="bi bi-check2-circle me-1"></i> Submit Record
                        </button>
                        <a href="{% url 'dashboard' %}" class="btn btn-light border fw-semibold px-4 py-2 rounded-3 text-secondary">
                            Cancel
                        </a>
                    </div>
                </form>

            </div>
        </div>
    </div>
</div>
{% endblock %}
