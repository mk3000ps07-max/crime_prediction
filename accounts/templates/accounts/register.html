{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card shadow-sm border-0 p-4">
            <h3 class="fw-bold text-center mb-4">Create an Account</h3>
            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-success w-100 fw-bold">Register to Report</button>
            </form>
            <p class="text-center mt-3 small">Already have an account? <a href="{% url 'login' %}">Log in here</a></p>
        </div>
    </div>
</div>
{% endblock %}
